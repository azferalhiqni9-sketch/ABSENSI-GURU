<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absensi Guru - Baitul Muttaqin</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page active" id="page-form">
      <div class="phone-frame">
        <div class="guru-header">
          <div class="logo-circle">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M24 8C18 8 12 10 12 10V38C12 38 18 36 24 36C30 36 36 38 36 38V10C36 10 30 8 24 8Z" fill="white" opacity="0.9"/>
              <line x1="24" y1="8" x2="24" y2="36" stroke="#d4a017" stroke-width="2"/>
              <path d="M16 15C18 14.5 20 14.3 22 14.4" stroke="#d4a017" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M16 20C18 19.5 20 19.3 22 19.4" stroke="#d4a017" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M26 15C28 14.5 30 14.3 32 14.4" stroke="#d4a017" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M26 20C28 19.5 30 19.3 32 19.4" stroke="#d4a017" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M18 6L24 2L30 6" fill="#f0c040" stroke="#d4a017" stroke-width="1"/>
            </svg>
          </div>
          <h1>ABSENSI GURU</h1>
          <p>BAITUL MUTTAQIN</p>
        </div>

        <div class="card-container">
          <p class="form-title">Form Absensi Guru</p>
          <div class="field-group">
            <label class="field-label">Nama Guru <span>*</span></label>
            <select id="select-nama">
              <option value="">Pilih nama guru</option>
              <option value="Didi Rusdyana">Didi Rusdyana</option>
              <option value="Moch. Syahid S.H.I">Moch. Syahid S.H.I</option>
              <option value="Anwar Hidayat S.S., S.S.I">Anwar Hidayat S.S., S.S.I</option>
              <option value="Eris Asyary S.Pd.I">Eris Asyary S.Pd.I</option>
              <option value="Moch. Gunawan">Moch. Gunawan</option>
              <option value="Nanang Nurhidayat">Nanang Nurhidayat</option>
              <option value="Wandi">Wandi</option>
              <option value="Rifal Saeful Wardani">Rifal Saeful Wardani</option>
              <option value="Jejen Zaenudin">Jejen Zaenudin</option>
              <option value="Nurjaid Abdullah">Nurjaid Abdullah</option>
              <option value="Neli Nurliah S.Pd">Neli Nurliah S.Pd</option>
              <option value="Rini Astriani S.Pd.I">Rini Astriani S.Pd.I</option>
              <option value="Nuri Nuryani">Nuri Nuryani</option>
              <option value="Ihsan Fahmi Lc">Ihsan Fahmi Lc</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">Status <span>*</span></label>
            <div class="status-grid">
              <button class="status-btn hadir" onclick="window.pilihStatus(this, 'hadir')"><span class="dot dot-green"></span>Hadir</button>
              <button class="status-btn izin" onclick="window.pilihStatus(this, 'izin')"><span class="dot dot-blue"></span>Izin</button>
              <button class="status-btn sakit" onclick="window.pilihStatus(this, 'sakit')"><span class="dot dot-orange"></span>Sakit</button>
              <button class="status-btn alpa" onclick="window.pilihStatus(this, 'alpa')"><span class="dot dot-red"></span>Alpa</button>
            </div>
          </div>

          <p class="err-msg" id="form-err">&#9888; Harap lengkapi semua field.</p>
          <button class="btn-primary" onclick="window.kirimAbsensi()">KIRIM ABSENSI</button>
          
          <div class="admin-link-wrap">
            <button class="admin-link" onclick="window.showPage('page-login')">Login sebagai Admin</button>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-berhasil">
      <div class="phone-frame">
        <div class="berhasil-wrap">
          <p>Absensi Berhasil</p>
          <div class="info-card">
            <div class="info-row"><span class="lbl">Nama</span><span class="val" id="res-nama">—</span></div>
            <div class="info-row"><span class="lbl">Status</span><span class="val" id="res-status">—</span></div>
          </div>
          <button class="btn-home" onclick="window.showPage('page-form')">Kembali</button>
        </div>
      </div>
    </div>

    <div class="page" id="page-login">
      <div class="login-wrap">
        <input type="text" id="inp-user" placeholder="Username">
        <input type="password" id="inp-pass" placeholder="Password">
        <button class="btn-login" onclick="window.doLogin()">Masuk</button>
        <button onclick="window.showPage('page-form')">Kembali</button>
      </div>
    </div>

    <div class="page" id="page-admin">
      <div class="admin-body">
        <button onclick="window.eksporExcel()">Export Excel</button>
        <button onclick="window.doLogout()">Keluar</button>
        <input type="text" id="search-inp" oninput="window.renderTable()" placeholder="Cari...">
        <div id="stats-row"></div>
        <table>
          <thead><tr><th>No</th><th>Tanggal</th><th>Waktu</th><th>Nama</th><th>Status</th><th>Aksi</th></tr></thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module" src="script.js"></script>
  </body>
      </html>
